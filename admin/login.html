<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mamafarm | Admin Portal</title>
  <meta name="description" content="Mamafarm Srinika Agro Foods - Administrator Control Portal Log In">
  <link rel="stylesheet" href="css/admin.css">
  <link rel="icon" type="image/png" href="../assets/images/favicon.png">
</head>
<body>

  <main class="login-container">
    <div class="brand-wrapper">
      <img src="../assets/images/logo.png" alt="Mamafarm Logo" class="brand-logo" onerror="this.style.display='none'">
      <h1 class="brand-name">Mamafarm</h1>
      <p class="brand-sub">Srinika Agro Foods</p>
      <span class="brand-portal">Administrator Portal</span>
    </div>

    <form onsubmit="return false;">
      <div class="form-group">
        <label for="email" class="form-label">Email Address</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          class="form-input" 
          placeholder="admin@srinikaagrofoods.com" 
          autocomplete="email"
          required
        >
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          class="form-input" 
          placeholder="••••••••" 
          autocomplete="current-password"
          required
        >
      </div>

      <button type="submit" class="btn-login">Admin Login</button>
    </form>

    <div class="back-link-wrapper">
      <a href="../index.html" class="back-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Back to Store
      </a>
    </div>
  </main>

  <script src="js/admin-auth.js"></script>
</body>
</html>
